name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  cmake:
    name: CMake (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-2022]
    steps:
      - uses: actions/checkout@v6

      - name: Configure
        run: cmake -B build -DBBB_DMX_BUILD_TESTS=ON

      - name: Build
        run: cmake --build build --config Release

      - name: Test
        run: ctest --test-dir build -C Release --output-on-failure

  schemas:
    name: JSON Schemas
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Compile JSON Schemas
        run: scripts/validate-schemas.sh
